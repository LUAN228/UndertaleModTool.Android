name: Build Android APK

on:
  push:
    branches: [ "**" ] # Garante que vai rodar independente do nome da branch
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Baixar o código e Dependências Ocultas
      uses: actions/checkout@v4
      with:
        submodules: recursive # ISSO CORRIGE O ERRO DO UNDERANALYZER!
        fetch-depth: 0

    - name: 2. Travar o .NET na versão correta
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: 3. Instalar Motor do Android
      run: dotnet workload install android

    - name: 4. Compilar SOMENTE o App Android
      run: |
        # Caçador inteligente: Procura apenas arquivos que tenham "Android" no nome
        PROJECT_FILE=$(find . -iname "*android*.csproj" | head -n 1)
        
        if [ -z "$PROJECT_FILE" ]; then
          echo "ERRO CRÍTICO: Não encontrei nenhum arquivo com 'Android' no nome."
          echo "Por favor, verifique se você criou o arquivo 'UndertaleModTool.Android.csproj'."
          exit 1
        fi
        
        echo "Sucesso! Encontrei o arquivo correto: $PROJECT_FILE"
        
        # Compila do jeito certo
        dotnet publish "$PROJECT_FILE" -c Release -f net8.0-android
        
    - name: 5. Salvar o instalador APK
      uses: actions/upload-artifact@v4
      with:
        name: UTMT-Android-App
        path: '**/*.apk'
