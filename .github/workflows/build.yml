name: Build Android APK

on:
  push:
    branches: [ "mestre", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código
      uses: actions/checkout@v3

    - name: Configurar o .NET 8
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Instalar o SDK do Android
      run: dotnet workload install android

    - name: Compilar o App para Android
      run: dotnet publish UndertaleModTool.Android/UndertaleModTool.Android.csproj -c Release -f net8.0-android

    - name: Salvar o APK com sucesso
      uses: actions/upload-artifact@v4
      with:
        name: UTMT-Android-App
        path: '**/bin/Release/net8.0-android/**/*.apk'
