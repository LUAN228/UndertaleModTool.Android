name: Build Android APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Baixar o código e Dependências Ocultas
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: 2. Travar o .NET na versão correta
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: 3. Instalar Motor do Android
      run: dotnet workload install android

    - name: 3.5. Limpar cache completo
      run: |
        echo "Removendo todos os diretórios obj e bin..."
        find . -type d -name "obj" -exec rm -rf {} + 2>/dev/null || true
        find . -type d -name "bin" -exec rm -rf {} + 2>/dev/null || true
        find . -type f -name "*.lock" -delete 2>/dev/null || true

    - name: 4. Compilar SOMENTE o App Android
      run: |
        # Encontrar projeto Android - com proteção contra múltiplos matches
        PROJECT_FILE=$(find . -iname "*android*.csproj" -print -quit)
        
        if [ -z "$PROJECT_FILE" ]; then
          echo "ERRO CRÍTICO: Não encontrei nenhum arquivo com 'Android' no nome."
          exit 1
        fi
        
        echo "Projeto encontrado: $PROJECT_FILE"
        
        dotnet clean "$PROJECT_FILE" -c Release 2>/dev/null || true
        dotnet restore "$PROJECT_FILE"
        dotnet publish "$PROJECT_FILE" -c Release -f net10.0-android
        
    - name: 5. Salvar o instalador APK
      uses: actions/upload-artifact@v4
      with:
        name: UTMT-Android-App
        path: '**/*.apk'
