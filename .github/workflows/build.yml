name: Build Android APK

on:
  push:
    branches: [ "**" ] # Roda automaticamente em qualquer branch
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Instalar o SDK do Android
      run: dotnet workload install android

    - name: Compilar o Aplicativo para Android
      run: |
        # Procura automaticamente qualquer arquivo de projeto (.csproj) e compila
        PROJECT_FILE=$(find . -name "*.csproj" | head -n 1)
        if [ -z "$PROJECT_FILE" ]; then
          echo "ERRO CRÍTICO: Nenhum arquivo .csproj foi encontrado no repositório. Você precisa criar o arquivo do projeto!"
          exit 1
        fi
        echo "Projeto encontrado: $PROJECT_FILE"
        dotnet publish "$PROJECT_FILE" -c Release -f net8.0-android

    - name: Salvar o APK com sucesso
      uses: actions/upload-artifact@v4
      with:
        name: UTMT-Android-App
        path: '**/bin/Release/net8.0-android/**/*.apk'
